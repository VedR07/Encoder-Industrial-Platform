services:
  - type: web
    name: intelliplant-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # You will enter this securely on the Render dashboard

  - type: web
    name: intelliplant-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: intelliplant-backend
          envVarKey: RENDER_EXTERNAL_URL
